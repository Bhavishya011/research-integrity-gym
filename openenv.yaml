name: research-integrity-gym
version: "1.0.0"
description: >
  An OpenEnv environment where AI agents evaluate scientific research integrity.
  Agents audit methodology flaws, replicate experiments, and verify statistical
  claims — the verification half of science that no existing environment covers.

author: Bhavishya Jain
tags:
  - openenv
  - science
  - research-integrity
  - reproducibility
  - tabular

tasks:
  - id: task1_methodology_audit
    name: Methodology Audit
    difficulty: easy
    max_steps: 20
    description: >
      Agent reads a procedurally generated paper stub containing 4 planted
      methodological flaws and must identify them all.

  - id: task2_replication
    name: Experiment Replication
    difficulty: medium
    max_steps: 20
    description: >
      Agent receives a methods section and must write Python code to replicate
      a logistic regression experiment, handling class imbalance correctly.

  - id: task3_claim_verify
    name: Claim Verification
    difficulty: hard
    max_steps: 20
    description: >
      Agent must independently verify a statistical claim using the raw dataset,
      detecting a subtly incorrect result caused by undisclosed data exclusion.

  - id: task4_citation_check
    name: Citation Integrity Check
    difficulty: medium-hard
    max_steps: 20
    description: >
      Agent cross-references paper claims against citation excerpts to
      detect one fabricated citation. Addresses LLM hallucination detection.

observation_space:
  type: object
  fields:
    task_id: string
    step: integer
    paper_text: string
    dataset_summary: string_or_null
    code_result: string_or_null
    last_reward: float
    flags_raised: list_of_strings
    available_actions: list_of_strings
    done: boolean

action_space:
  type: object
  fields:
    action_type:
      type: enum
      values:
        - read_section
        - read_dataset
        - execute_code
        - flag_flaw
        - flag_concern
        - check_citation
        - flag_fabrication
        - submit_audit
        - submit_results
        - submit_verdict
        - submit_report
    section: string_or_null
    code: string_or_null
    flaw_type: string_or_null
    location: string_or_null
    description: string_or_null
    concern_type: string_or_null
    evidence: string_or_null
    citation_id: integer_or_null
    audit_payload: object_or_null
    results_payload: object_or_null
    verdict_payload: object_or_null
    report_payload: object_or_null

reward:
  range: [0.0, 1.0]
  type: shaped
  description: >
    Mid-episode signals reward exploration, data grounding, and correct code.
    Terminal reward is dominated by the deterministic grader score (80% weight).

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  tasks: GET /tasks
  grader: POST /grader
  baseline: POST /baseline
  health: GET /health

docker:
  port: 7860
  base_image: python:3.11-slim
